<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Escuderias | F1 Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo">F1<span>HUB</span></a>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html#secao-equipes">Escuderias</a></li>
                    <li><a href="favoritos.html" data-menu-favoritos>Favoritos</a></li>
                    <li><a href="admin.html" data-menu-admin>Cadastro</a></li>
                    <li><a href="login.html" data-menu-login>Login</a></li>
                    <li><button type="button" class="nav-button" data-menu-logout>Sair</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="admin-page" class="page-shell wide-page">
        <section class="admin-layout">
            <div class="form-card">
                <span class="hero-tag">CRUD</span>
                <h1>Cadastro de Escuderias</h1>
                <form id="form-equipe" class="stacked-form">
                    <input id="equipe-id" type="hidden">
                    <label>
                        Nome
                        <input id="equipe-nome" type="text" required>
                    </label>
                    <label>
                        Descrição
                        <textarea id="equipe-descricao" rows="3" required></textarea>
                    </label>
                    <label>
                        URL da imagem
                        <input id="equipe-imagem" type="url" required>
                    </label>
                    <div class="two-column-form">
                        <label>
                            Base
                            <input id="equipe-base" type="text" required>
                        </label>
                        <label>
                            Chefe de equipe
                            <input id="equipe-chefe" type="text" required>
                        </label>
                    </div>
                    <div class="two-column-form">
                        <label>
                            Motor
                            <input id="equipe-motor" type="text" required>
                        </label>
                        <label>
                            Títulos
                            <input id="equipe-titulos" type="text" required>
                        </label>
                    </div>
                    <label>
                        História
                        <textarea id="equipe-historia" rows="4" required></textarea>
                    </label>
                    <div class="two-column-form">
                        <label>
                            Títulos de construtores
                            <input id="equipe-estatistica-titulos" type="number" min="0" value="0" required>
                        </label>
                        <label>
                            Vitórias
                            <input id="equipe-vitorias" type="number" min="0" value="0" required>
                        </label>
                    </div>
                    <label class="checkbox-label">
                        <input id="equipe-destaque" type="checkbox">
                        Exibir no carrossel de destaques
                    </label>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Salvar</button>
                        <button id="btn-limpar-equipe" type="button" class="btn-secondary">Limpar</button>
                    </div>
                </form>
                <p id="mensagem-admin" class="status-message"></p>
            </div>

            <div class="admin-list-panel">
                <div class="section-title-block">
                    <h2>Itens cadastrados</h2>
                    <p>Visualize, altere ou exclua as escuderias do JSON Server.</p>
                </div>
                <div id="lista-admin-equipes" class="admin-list"></div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>Fórmula 1 Hub &copy; 2026 | Projeto Acadêmico</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
