<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário | F1 Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo">F1<span>HUB</span></a>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html#secao-equipes">Escuderias</a></li>
                    <li><a href="favoritos.html" data-menu-favoritos>Favoritos</a></li>
                    <li><a href="admin.html" data-menu-admin>Cadastro</a></li>
                    <li><a href="login.html" data-menu-login>Login</a></li>
                    <li><button type="button" class="nav-button" data-menu-logout>Sair</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="cadastro-usuario-page" class="page-shell">
        <section class="form-card">
            <span class="hero-tag">Novo usuário</span>
            <h1>Criar conta</h1>
            <form id="form-cadastro-usuario" class="stacked-form">
                <label>
                    Nome completo
                    <input id="cadastro-nome" type="text" required>
                </label>
                <label>
                    E-mail
                    <input id="cadastro-email" type="email" required>
                </label>
                <label>
                    Login
                    <input id="cadastro-login" type="text" autocomplete="username" required>
                </label>
                <label>
                    Senha
                    <input id="cadastro-senha" type="password" autocomplete="new-password" required>
                </label>
                <button type="submit" class="btn-primary">Cadastrar</button>
            </form>
            <p class="form-helper">Já tem conta? <a href="login.html">Entrar</a></p>
            <p id="mensagem-cadastro-usuario" class="status-message"></p>
        </section>
    </main>

    <footer class="main-footer">
        <p>Fórmula 1 Hub &copy; 2026 | Projeto Acadêmico</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
